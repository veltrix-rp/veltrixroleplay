<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Veltrix RP - Streamers</title>
    <style>
        body { 
            background-color: #050505; /* K7el ghameq bzaf */
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
        }
        .container { 
            text-align: center; 
            background: #0f0f0f; /* K7el khfif chwiya bach ibane l-farq */
            padding: 40px; 
            border-radius: 25px; 
            border: 1px solid #1a1a1a;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 380px;
        }
        h1 { 
            color: #53fc18; 
            margin-bottom: 35px; 
            font-size: 1.4rem; 
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(83, 252, 24, 0.3);
        }
        .streamer-list { display: flex; flex-direction: column; gap: 18px; }
        
        .kick-btn {
            background-color: #111; /* Background d l-button k7el */
            color: #53fc18; /* L-ktba khdra */
            text-decoration: none;
            padding: 14px 25px;
            font-weight: 800;
            border-radius: 15px;
            font-size: 1.1rem;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            border: 2px solid #53fc18; /* Itar khdar neon */
            box-shadow: 0 0 5px rgba(83, 252, 24, 0.1);
        }

        .kick-btn img {
            width: 26px;
            height: 26px;
            object-fit: contain;
            /* Had l-filter kikhali l-logo d kick dima mcha3el */
            filter: drop-shadow(0 0 2px rgba(83, 252, 24, 0.5));
        }

        .kick-btn:hover {
            transform: scale(1.03);
            background-color: #53fc18; /* Reja3 khdar f hover */
            color: #000; /* L-ktba treja3 k7la */
            box-shadow: 0 0 25px rgba(83, 252, 24, 0.5);
        }

        .back-link {
            margin-top: 35px;
            display: inline-block;
            color: #444;
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .back-link:hover { 
            color: #53fc18;
            text-shadow: 0 0 5px #53fc18;
        }
    </style>
</head>
<body>
  <div class="container">
        <h1>🟢 LIVE ON KICK</h1>
        <div class="streamer-list">
            <a href="https://kick.com/squetchy" target="_blank" class="kick-btn">
                <img src="assets/kick.png" alt="Kick"> SQUETCHY
            </a>
            <a href="https://kick.com/LM3ASB-RH" target="_blank" class="kick-btn">
                <img src="assets/kick.png" alt="Kick"> LM3ASB_RH
            </a>
            <a href="https://kick.com/KING_ROBOT" target="_blank" class="kick-btn">
                <img src="assets/kick.png" alt="Kick"> KING_ROBOT
            </a>
            <a href="https://kick.com/za3bol-dfx" target="_blank" class="kick-btn">
                <img src="assets/kick.png" alt="Kick"> ZA3BOL-DFX
            </a>
           <a href="https://kick.com/heisssen-leo" target="_blank" class="kick-btn">
                <img src="assets/kick.png" alt="Kick"> heisssen-leo
            </a>
        </div>
        <!-- Khlliha wast l-container bach t-bqa m-centrer m3ah -->
        <a href="index.html" class="back-link">← Return to Lobby</a>
    </div>
</body>
</html>
